<!DOCTYPE html>
<html lang="it">

<head>
    <title>Lista campagne</title>
    <meta charset="utf-8">
    <meta name="description"
        content="Esplora le campagne di Dungeons & Dragons create dai Dungeon Master. Scopri trame avvincenti, NPC unici e avventure epiche per i tuoi giocatori">
    <meta name="keywords"
        content="D&D, Dungeons & Dragons, campagna, RPG, dungeon master, avventura, NPC, trame, gioco di ruolo">
    <link rel="stylesheet" href="../CSS/ap_stylesheet.css">
    <script src="./js/cerca_utenti.js"></script>
</head>

<body>
    <!-- Header incluso da header.html -->
    <div id="header-container">
        <script>
            fetch('./html/header.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('header-container').innerHTML = html;
                });
        </script>
    </div>

    <nav id="breadcrumb">
            <ul>
                <li lang="en"><a href="../homepage.php">Home</a></li>
                <li>Campagna</a></li>
            </ul> 
        </nav>

    <main>
        <div class="button-group">
                <a href="../creazione_campagna.php" class="btn btn-primary">
                    Crea Campagne
                </a>
        </div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Cerca campagna..." onChange="cercaCampagna()">
        </div>
        <section id="campagne-list">
            <p id="descrizione-campagne" class="visually-hidden">Questa tabella mostra le campagne disponibili.</p>
            <table aria-describedby="descrizione-campagne">
                <thead>
                    <tr>
                        <th scope="col">Nome Campagna</th>
                        <th scope="col">Tipologia</th>
                        <th scope="col">Durata</th>
                        <th scope="col">Descrizione</th>
                    </tr>
                </thead>
            </table>
        </section>
    </main>

</body>
