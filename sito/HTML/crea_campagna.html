<!DOCTYPE html>
<html lang="it">

<head>
    <title>Crea Campagna - Dungeon Master</title>
    <meta charset="utf-8">
    <meta name="description"
        content="Crea la tua avventura per Dungeons & Dragons. Definisci trame, NPC, luoghi e mostri per i tuoi giocatori">
    <meta name="keywords"
        content="D&D, Dungeons & Dragons, campagna, RPG, dungeon master, avventura, NPC, trame, gioco di ruolo">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/mini.css" media="screen and (max-width:800px)">
    <link rel="stylesheet" href="./css/print.css" media="print">
    <script src="./js/cerca_utenti.js"></script>
</head>

<body>
    <!-- Header incluso da header.html -->
    <div id="header-container">
        <script>
            fetch('header.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('header-container').innerHTML = html;
                });
        </script>
    </div>

    <nav aria-label="Breadcrumb" class="breadcrumb">
        <ul>
            <li><a href="#home" lang="en">Home</a></li>
            <li><strong>Lista campagne</strong></li>
        </ul>
    </nav>

    <main>
        <section class="crea-campagna">
            <h2>Crea la tua Campagna</h2>
            <form action="/submit_campagna" method="post">
                <label for="nome_campagna">Nome Campagna:</label>
                <input type="text" id="nome_campagna" name="nome_campagna" placeholder="Nome della Campagna" required>
                    
                <label for="tipologia">Tipologia:</label>
                <select id="tipologia" name="tipologia" required>
                    <option value="esistente">Esistente</option>
                    <option value="originale">Originale</option>
                </select>
                
                <label for="durata">Durata:</label>
                <select id="durata" name="durata" required>
                    <option value="one_shot" lang="en">One Shot</option>
                    <option value="a_sessioni">A Sessioni</option>
                </select>
                
                <label for="membri">Membri:</label>
                <input type="text" id="membri" name="membri" placeholder="Cerca utente..."">
                </select>
                
                <label for="codice_campagna">Codice Campagna:</label>
                <input type="text" id="codice_campagna" name="codice_campagna" readonly>
                
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" requiered>
                
                <label for="descrizione">Descrizione:</label>
                <textarea id="descrizione" name="descrizione" placeholder="Descrizione" required></textarea>
                
                <input type="submit" value="Crea Campagna">
            </form>
        </section>
    </main>
</body>
