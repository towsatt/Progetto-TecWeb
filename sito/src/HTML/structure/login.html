<main class="content"> 
    <form action="login.php" method="POST" id="form_login">

        <div class="panel active" id="p_panel_login">
            <div class="field_wrap">
                <label for="p_uname"><strong><span lang="en">Username</span></strong> <span class="required_mark" aria-hidden="true">*</span></label>
                <input type="text" id="p_uname" name="username" placeholder="Il tuo username">
            </div>
            <div class="field_wrap">
                <label for="p_pwd"><strong><span lang="en">Password</span></strong> <span class="required_mark" aria-hidden="true">*</span></label>
                <div class="input_row">
                    <input type="password" id="p_pwd" name="password" placeholder="La tua password">
                    <button type="button" class="eye_btn" aria-label="Mostra password" onclick="togglePwd('p_pwd',this)">👁</button>
                </div>
            </div>
            <div class="form_footer">
                <button type="submit" value="submit" class="btn_primary">Accedi</button>
                <span class="switch_hint">Non hai un <span lang="en">account</span>? <a class="link" href="registrazione">Registrati</a></span>
            </div>
        </div>
    </form>
</main>
