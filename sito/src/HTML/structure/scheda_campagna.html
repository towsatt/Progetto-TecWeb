<!-- Main/Contenuto -->
        <main class="scheda_campagna">
            <!-- Gruppo bottoni elimina modifica -->
            <div id="buttons">
                <button type="button" id="modifica" aria-readonly="true" disabled><strong>Modifica</strong></button>
                <button type="button" id="elimina" aria-readonly="true" disabled><strong>Elimina</strong></button>
            </div>
            <!-- Nome Campagna -->
            <h1>[NOME_CAMPAGNA]</h1>
            <!-- Dettagli della Campagna -->
            <div class="block" id="dettagli">
                <h2>Dettagli della Campagna</h2>
                <dl>
                    <dt><strong>Tipologia</strong></dt>
                    <dd>[TIPOLOGIA]</dd>

                    <dt><strong>Durata</strong></dt>
                    <dd>[DURATA]</dd>

                    <dt><strong>Codice Campagna</strong></dt>
                    <dd>[CODICE_CAMPAGNA]</dd>

                    <dt><strong lang="en">Password</strong></dt>
                    <dd>[PASSWORD]</dd>

                    <dt><strong>Descrizione</strong></dt>
                    <dd>[DESCRIZIONE]</dd>
                </dl>
            </div>
            <!-- Membri -->
            <div class="block" id="membri">
                <button type="button" disabled><strong>Invita</strong></button> 
                <h2>Membri</h2>
                <ul>
                    [DUNGEON_MASTER]
                    [MEMBRI]
                </ul>
            </div>
            <!-- Sessioni -->
            <div class="block" id="sessioni">
                <button type="button" disabled><strong>Aggiungi</strong></button> 
                <h2>Sessioni</h2>
                <ul>
                    <li>[SESSIONI]</li>
                </ul>
            </div>
        </main>
