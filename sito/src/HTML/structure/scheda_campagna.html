        <!-- Main/Contenuto -->
        <main class="scheda_campagna">
            <!-- Gruppo bottoni elimina modifica -->
            <div id="buttons"> 
                <button type="button" id="modifica" aria-readonly="true"><strong>Modifica</strong></button> <!-- sarebbe type="submit" ?? -->
                <button type="button" id="elimina" aria-readonly="true"><strong>Elimina</strong></button> <!-- visibile solo da admin-->
            </div>
            <!-- Nome Campagna - Sessione x -->
            <h1>[NOME_CAMPAGNA] - Sessione [NUM_SESSIONE]</h1> <!-- Prendere il valore dal db -->
            <!-- Descrizione della Sessione -->
            <div class="block" id="descrizione_sessione"> <!-- Prendere il valore dal db -->
                <h2>Descrizione della Sessione</h2>
                [DESCRIZIONE]
            </div>
            <!-- Scheda del Personaggio -->
            <div class="block" id="scheda_personaggio">  <!-- Prendere il valore dal db -->
                <h2>Scheda del Personaggio</h2>
                <ul> <!-- il PHP popola questa lista con i personaggi della sessione -->
                    [Personaggi]
                </ul>

            </div>
            <!-- Pagination -->
            <ul id="pagination"> <!-- Da sistemare, dipende dal numero di sessioni -->
                [PAGINAZIONE]
            </ul>
        </main>
