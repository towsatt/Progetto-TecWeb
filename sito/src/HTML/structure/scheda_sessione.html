<!-- Main/Contenuto -->
        <main class="scheda_sessione">
            <!-- Gruppo bottoni elimina modifica -->
            <div id="buttons"> 
                <button type="button" id="modifica" aria-readonly="true" disabled><strong>Modifica</strong></button>
                <button type="button" id="elimina" aria-readonly="true" disabled><strong>Elimina</strong></button>
            </div>
            <!-- Nome Campagna - Sessione x -->
            <h1>[NOME_CAMPAGNA] - Sessione [NUM_SESSIONE]</h1>
            <!-- Descrizione della Sessione -->
            <div class="block" id="descrizione_sessione">
                <h2>Descrizione della Sessione</h2>
                <p>[DESCRIZIONE]</p>
            </div>
            <!-- Data dell'inserimento della sessione-->
            <div class="block" id="data_sessione">
                <h3>Sessione caricata il [DATA]</h3>
            </div>
            <!-- Scheda del Personaggio -->
            <div class="block" id="scheda_personaggio">
                <h2>Scheda del Personaggio</h2>
                <ul>
                    [Personaggi]
                </ul>
            </div>
            <!-- Pagination -->
            <ul id="pagination">
                [PAGINAZIONE]
            </ul>
        </main>
