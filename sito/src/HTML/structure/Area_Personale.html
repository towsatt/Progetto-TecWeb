<main class="content">
    <div class="grid-container">

        <div class="headerpagina">
            <h1>Benvenuto [NICKNAME]</h1>
        </div>

        <div class="left">
            <div class="avatar-container">
                <div class="profile-container">

                    <div class="profile-circle" id="profileCircle">
                        [PROFILE_IMG]
                    </div>
                </div>
                <div class="reset">
                    <button class="btn-reset" id="resetBtn">Elimina foto</button>
                </div>
            </div>
        </div>
        <div class="middle">
            <div class="nickname-zone">
                <label for="nickname"> <span lang="en">Nickname</span></label>
                <div class="input-part">
                    [USERNAME]
                    <button type="button" class="edit-btn" alt="Modifica <span lang='en'>Nickname</span>"
                        data-field="nickname"><img src="../../assets/img//area_personale/Modifica_penna.png" width="30"
                            height="30"> </button>
                </div>
            </div>
            <div class="password-zone">
                <label for="password"> <span lang="en">Password</span></label>
                <div class="input-part">
                    [PASSWORD]
                    <button type="button" class="toggle-password-btn" id="togglePasswordBtn" title="Mostra password">Mostra</button>
                    <button type="button" class="edit-btn" alt="Modifica <span lang='en'>Password</span>"
                        data-field="password"><img src="../../assets/img/area_personale/Modifica_penna.png" width="30"
                            height="30"> </button>
                </div>
            </div>

            <div class="email-zone">
                <label for="email"><span lang="en">Email</span></label>
                <div class="input-part">
                    [EMAIL]
                    <button type="button" class="edit-btn" alt="Modifica <span lang='en'>Email</span>"
                        data-field="email"><img src="../../assets/img/area_personale/Modifica_penna.png" width="30"
                            height="30"> </button>
                </div>
            </div>

            <div class="description">
                <label for="description">Descrizione</label>
                <div class="input-part">
                    [DESCRIPTION]
                    <textarea id="description" maxlength="500" rows="4" readonly disabled></textarea>
                    <button type="button" class="edit-btn" alt="Modifica descrizione" data-field="description"><img
                            src="../../assets/img/area_personale/Modifica_penna.png" width="30" height="30"></button>
                </div>
            </div>
        </div>

        <div class="right">
            <div class="notifica">
                <label for="notification" class="notification">
                    <img id="notifica_chiusa" src="../../assets/img/area_personale/notifica_chiusa.png" alt="notifiche"
                        width="90" height="70" class="notifica_chiusa">
                </label>
            </div>

            <div class="user-content">
                <h3>I tuoi Personaggi</h3>
                <ul id="personaggi-list">
                    [PERSONAGGI_LIST]
                </ul>
                
                <h3>Le tue Campagne</h3>
                <ul id="campagne-list">
                    [CAMPAGNE_LIST]
                </ul>
            </div>

        </div>
    </div>
</main>
